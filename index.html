<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzes</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #00d4ff;
            --bg-overlay: rgba(0, 0, 0, 0.75);
            --card-bg: rgba(255, 255, 255, 0.1);
            --text-color: #ffffff;
            --sub-text: #cccccc;
            --footer-bg: rgba(0, 0, 0, 0.5);
        }

        /* تحسينات الوضع الفاتح لضمان ظهور الكلام */
        .light-mode {
            --bg-overlay: rgba(255, 255, 255, 0.9); /* خلفية بيضاء شبه معتمة */
            --card-bg: rgba(0, 0, 0, 0.05);
            --text-color: #1a1a1a; /* نص أسود غامق */
            --sub-text: #444444;
            --primary-color: #0066cc;
            --footer-bg: rgba(255, 255, 255, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #000;
            color: var(--text-color);
            transition: background 0.3s ease, color 0.3s ease;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* فيديو الخلفية */
        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            object-fit: cover;
        }

        .main-container {
            position: relative;
            min-height: 100vh;
            background: var(--bg-overlay);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            z-index: 1;
        }

        /* أنميشن الأوراق البسيطة */
        .falling-paper {
            position: fixed;
            width: 15px;
            height: 20px;
            background: rgba(255, 255, 255, 0.2);
            z-index: -1;
            pointer-events: none;
            animation: fall linear infinite;
        }
        @keyframes fall {
            from { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            50% { opacity: 0.5; }
            to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        /* الهيدر */
        header {
            width: 100%;
            max-width: 1000px;
            text-align: center;
            margin-top: 40px;
            margin-bottom: 50px;
        }

        .top-nav {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            max-width: 1100px;
        }

        #theme-toggle {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        .description {
            font-size: 1.1rem;
            color: var(--sub-text);
            max-width: 600px;
            margin: 0 auto;
        }

        /* شبكة المواد */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1100px;
            margin-bottom: 80px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(128, 128, 128, 0.2);
            padding: 30px 15px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            background: var(--primary-color);
            color: #fff;
        }

        .card i {
            font-size: 2.5rem;
            margin-bottom: 15px;
            display: block;
        }

        .card h3 {
            font-size: 1.1rem;
        }

        /* الفوتر */
        footer {
            margin-top: auto;
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
            background: var(--footer-bg);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(128, 128, 128, 0.2);
        }

        .footer-link {
            text-decoration: none;
            color: var(--primary-color);
            font-weight: bold;
            display: inline-block;
            margin-left:10px ;
            gap: 12px;
            font-size: 1.4rem;
            transition: all .5s ease;
        }

        .footer-link:hover {
            text-decoration: none;
            transform: scale(1.2);
            
        }

        /* التوافق مع الجوال */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <video autoplay muted loop class="video-bg" id="bgVideo">
        <source src="" type="video/mp4">
    </video>

    <div class="main-container">
        <nav class="top-nav">
            <button id="theme-toggle" title="Switch Theme"><i class="fas fa-sun"></i></button>
        </nav>

        <header>
            <h1>Quizzes</h1>
            <p class="description">
                Welcome to the ultimate interactive collection of quizzes. 
                Everything you need to study in one fun and organized place.
            </p>
        </header>

        <main class="grid">
            <div class="card" onclick="location.href='organic.html'">
               <i class="fa-duotone fa-regular fa-flask-vial"></i>
                <h3>Organic II</h3>
            </div>
            <div class="card" onclick="location.href='analytical.html'">
                <i class="fas fa-microscope"></i>
                <h3>Analytical II</h3>
            </div>
            <div class="card" onclick="location.href='pharmacognosy.html'">
                <i class="fas fa-leaf"></i>
                <h3>Pharmacognosy</h3>
            </div>
            <div class="card" onclick="location.href='physical.html'">
                <i class="fas fa-atom"></i>
                <h3>Physical Pharmacy</h3>
            </div>
            <div class="card" onclick="location.href='anatomy.html'">
                <i class="fas fa-dna"></i>
                <h3>Anatomy & Histology</h3>
            </div>
            <div class="card" onclick="location.href='english.html'">
                <i class="fas fa-spell-check"></i>
                <h3>English II</h3>
            </div>
            <div class="card" onclick="location.href='it.html'">
                <i class="fas fa-desktop"></i>
                <h3>IT</h3>
            </div>
        </main>

        <footer>
            <p>If you have any suggestions, contact me:</p>
            <a href="https://t.me/YourUsername" class="footer-link" target="_blank">
                <i class="fab fa-telegram"></i> 
            </a>
        </footer>
    </div>

    <script>
        // 1. نظام الفيديوهات العشوائية عند الريفرش
        const videoSources = [
            "https://www.freepik.com/free-video/stationary-shot-silver-confetti-falling-against-grey-background_154581#fromView=keyword&page=1&position=0&uuid=33c78fd7-cd03-4ce2-98e2-140d79866e6b",
            // "https://assets.mixkit.co/videos/preview/mixkit-studying-hard-at-a-desk-40058-large.mp4",
            // "https://assets.mixkit.co/videos/preview/mixkit-top-view-of-a-person-writing-on-a-notebook-41132-large.mp4",
            // "https://assets.mixkit.co/videos/preview/mixkit-searching-for-information-in-the-library-42774-large.mp4",
            // "https://assets.mixkit.co/videos/preview/mixkit-books-stack-on-a-wooden-table-11532-large.mp4"
        ];

        window.onload = function() {
            const video = document.getElementById('bgVideo');
            const randomSource = videoSources[Math.floor(Math.random() * videoSources.length)];
            video.src = randomSource;
            video.load();
        };

        // 2. تبديل الوضع (ليلي / فاتح)
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            const icon = themeToggle.querySelector('i');
            if (document.body.classList.contains('light-mode')) {
                icon.className = 'fas fa-moon';
            } else {
                icon.className = 'fas fa-sun';
            }
        });

        // 3. أنميشن الأوراق المتطايرة (بسيطة وخفيفة)
        function createPaper() {
            const paper = document.createElement('div');
            paper.className = 'falling-paper';
            paper.style.left = Math.random() * 100 + 'vw';
            paper.style.animationDuration = (Math.random() * 5 + 5) + 's';
            paper.style.opacity = Math.random() * 0.3;
            document.body.appendChild(paper);

            setTimeout(() => {
                paper.remove();
            }, 10000);
        }

        // إنشاء ورقة كل ثانية (خفيفة على المتصفح)
        setInterval(createPaper, 1000);
    </script>
</body>
</html>
