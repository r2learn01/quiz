<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzes</title>

     <script defer src="/_vercel/insights/script.js"></script>

    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* تعريف الألوان الأساسية للوضع الداكن المريح للعين (أسود عميق مع سيان متوهج) */
        :root {
            --bg-gradient-1: #050505; /* أسود عميق جداً */
            --bg-gradient-2: #17181a; /* رمادي داكن هادي */
            --bg-gradient-3: #070818; /* أسود ليلي */
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-border: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc; /* أبيض ناصع وناعم لراحة العين */
            --text-muted: #94a3b8; /* رمادي فاتح للنصوص الفرعية */
            --accent-color: #0adaf1c7; /* أزرق سيان ناعم وجذاب جداً */
            --hover-bg: rgba(255, 255, 255, 0.04); /* لون الهوفر الهادي */
            --hover-border: rgba(0, 229, 255, 0.4); /* حدود بلون الأكسنت عند الهوفر */
            --hover-shadow: rgba(0, 229, 255, 0.15); /* توهج (Glow) خفيف ومريح */
            --paper-color: rgba(255, 255, 255, 0.192);
        }

        /* الوضع الفاتح (زي ما هو) */
        .light-mode {
            --bg-gradient-1: #f4f6f9;
            --bg-gradient-2: #e9ecef;
            --bg-gradient-3: #f1f3f5;
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-border: rgba(0, 0, 0, 0.05);
            --text-main: #2d3748;
            --text-muted: #718096;
            --accent-color: #4299e1;
            --hover-bg: rgba(255, 255, 255, 1);
            --hover-border: rgba(66, 153, 225, 0.4);
            --hover-shadow: rgba(66, 153, 225, 0.1);
            --paper-color: rgba(54, 52, 52, 0.452);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* تطبيق الخط الجديد هنا */
            font-family: 'Poppins', system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(180deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3));
            background-size: 200% 200%;
            /* الحل هنا: تثبيت الخلفية لمنع ظهور التقطيع الأبيض أثناء السكرول */
            background-attachment: fixed;
            animation: gradientMove 20s ease infinite;
            color: var(--text-main);
            transition: background 0.5s ease, color 0.5s ease;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* أنميشن الأوراق بشكل أهدى وأخف */
        .falling-paper {
            position: fixed;
            width: 10px;
            height: 14px;
            background: var(--paper-color);
            z-index: 0;
            pointer-events: none;
            border-radius: 2px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 0; }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { transform: translateY(105vh) rotate(360deg) translateX(50px); opacity: 0; }
        }

        .main-container {
            width: 100%;
            max-width: 1250px;
            padding: 20px;
            z-index: 1;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .top-nav {
            display: flex;
            justify-content: flex-end;
            padding: 15px 0;
        }

        #theme-toggle {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--card-border);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        #theme-toggle:hover {
            color: var(--accent-color);
            border-color: var(--accent-color);
            background: var(--card-bg);
            /* تأثير إضاءة خفيف للزر */
            box-shadow: 0 0 10px var(--hover-shadow);
        }

        header {
            text-align: center;
            margin: 30px 0 50px 0;
            min-height: 130px; /* تم إضافته عشان الصفحة متهتزش وقت الكتابة */
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text-main);
            letter-spacing: 1px;
        }

        h1 span {
            color: var(--accent-color);
        }

        /* تنسيقات الـ Typewriter */
        .description {
            font-family:"consolas", "monospace";
            font-size: 1.1rem;
            line-height: 1.7;
            color: var(--text-muted);
            max-width: 550px;
            margin: 0 auto;
            font-weight: 400;
        }

        /* مؤشر الكتابة للآلة الكاتبة */
        .description::after {
            content: '|';
            animation: blink 0.7s infinite;
            color: var(--accent-color);
            margin-left: 3px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* توزيع الكروت المرن والمريح */
        .card-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            width: 100%;
            margin-bottom: 80px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            width: 280px; /* عرض ثابت للكارت عشان التوزيع يبقى متناسق */
            padding: 35px 20px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* أنميشن أنعم للكارت */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* الهوفر الهادي والمريح للعين مع تأثير الـ Glow */
        .card:hover {
            transform: translateY(-8px);
            background: var(--hover-bg);
            border-color: var(--hover-border);
            box-shadow: 0 12px 25px var(--hover-shadow);
        }

        .card i {
            font-size: 2.8rem;
            margin-bottom: 18px;
            color: var(--text-muted);
            transition: all 0.3s ease;
        }

        .card:hover i {
            color: var(--accent-color);
            transform: scale(1.1); /* تكبير الأيقونة سيكا مع الهوفر */
        }

        .card h3 {
            font-size: 1.25rem;
            font-weight: 500; /* وزن خط مريح */
            color: var(--text-main);
            transition: color 0.3s ease;
            letter-spacing: 0.5px;
        }

        footer {
            margin-top: auto;
            text-align: center;
            padding: 30px 20px;
            width: 100%;
            border-top: 1px solid var(--card-border);
        }

        .footer-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .footer-content p {
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 300;
        }

        .footer-link {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 1.8rem;
            transition: all 0.3s ease;
        }

        .footer-link:hover {
            color: var(--accent-color);
            transform: scale(1.15);
            /* توهج خفيف لأيقونة التليجرام */
            text-shadow: 0 0 10px var(--hover-shadow);
        }

        @media (max-width: 650px) {
            .card-container {
                display: grid;
                grid-template-columns: repeat(2, 1fr); /* عمودين متساويين */
                gap: 15px; /* مسافة أصغر لتناسب الشاشة */
                padding: 10px;
            }
            .card {
                width: 100%; /* تأخذ عرض العمود بالكامل */
                padding: 25px 10px;
                border-radius: 15px;
            }
            .card i { font-size: 2.2rem; margin-bottom: 12px; }
            .card h3 { font-size: 0.95rem; }
            header { margin: 20px 0 30px 0; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <nav class="top-nav">
            <button id="theme-toggle" title="Switch Theme"><i class="fas fa-sun"></i></button>
        </nav>

        <header>
            <h1>Quiz<span>zes</span></h1>
            <p class="description" id="typewriter-text"></p>
        </header>

        <main class="card-container">
            <div class="card" onclick="location.href='subject.html?id=organic'">
                <i class="fas fa-flask"></i>
                <h3>Organic II</h3>
            </div>
            <div class="card" onclick="location.href='subject.html?id=analytical'">
                <i class="fas fa-microscope"></i>
                <h3>Analytical II</h3>
            </div>
            <div class="card" onclick="location.href='subject.html?id=pharmacognosy'">
                <i class="fas fa-leaf"></i>
                <h3>Pharmacognosy</h3>
            </div>
            <div class="card" onclick="location.href='subject.html?id=physical'">
                <i class="fas fa-atom"></i>
                <h3>Physical Pharmacy</h3>
            </div>
            <div class="card" onclick="location.href='subject.html?id=anatomy'">
                <i class="fas fa-dna"></i>
                <h3>Anatomy & Histology</h3>
            </div>
            <div class="card" onclick="location.href='subject.html?id=english'">
                <i class="fas fa-spell-check"></i>
                <h3>English II</h3>
            </div>
            <div class="card" onclick="location.href='subject.html?id=it'">
                <i class="fas fa-desktop"></i>
                <h3>IT</h3>
            </div>
        </main>

        <footer>
            <div class="footer-content">
                <p>You Have Suggestions?! Contact Me:</p>
                <a href="https://t.me/hazem_py" class="footer-link" target="_blank">
                    <i class="fab fa-telegram"></i> 
                </a>
            </div>
        </footer>
    </div>

    <script>
        // نظام تبديل الوضع (ليلي / فاتح)
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            const icon = themeToggle.querySelector('i');
            icon.className = document.body.classList.contains('light-mode') ? 'fas fa-moon' : 'fas fa-sun';
        });

        // نظام أنميشن الأوراق المتساقطة
        function createPaper() {
            const paper = document.createElement('div');
            paper.className = 'falling-paper';
            paper.style.left = Math.random() * 100 + 'vw';
            
            // سرعات هادية جداً للورق
            const duration = (Math.random() * 8 + 8); 
            paper.style.animationDuration = duration + 's';
            
            document.body.appendChild(paper);

            setTimeout(() => {
                paper.remove();
            }, duration * 1000);
        }

        // إنشاء الاوراق
        setInterval(createPaper, 500);

        // نظام الآلة الكاتبة (Typewriter Effect) باللغة الإنجليزية
        const phrases = [
            "All In One Place ✅",
            "Interactive, Never Boring 🚀",
            "Expected For Exams 🎯",
            "From Recordings & PDFs 📖",
            "Save Time 👉 Study Smart 💡"
        ];
        
        let currentPhraseIndex = 0;
        let currentCharIndex = 0;
        let isDeleting = false;
        const typewriterElement = document.getElementById('typewriter-text');

        function typeEffect() {
            const currentPhrase = phrases[currentPhraseIndex];
            
            if (isDeleting) {
                typewriterElement.textContent = currentPhrase.substring(0, currentCharIndex - 1);
                currentCharIndex--;
            } else {
                typewriterElement.textContent = currentPhrase.substring(0, currentCharIndex + 1);
                currentCharIndex++;
            }

            let typingSpeed = isDeleting ? 20 : 50; // سرعة الكتابة والمسح

            if (!isDeleting && currentCharIndex === currentPhrase.length) {
                typingSpeed = 1200; // الانتظار بعد كتابة الجملة
                isDeleting = true;
            } else if (isDeleting && currentCharIndex === 0) {
                isDeleting = false;
                currentPhraseIndex = (currentPhraseIndex + 1) % phrases.length;
                typingSpeed = 500; // الانتظار قبل الجملة الجديدة
            }

            setTimeout(typeEffect, typingSpeed);
        }

        // تشغيل تأثير الآلة الكاتبة بعد تحميل الصفحة
        window.onload = () => {
            setTimeout(typeEffect, 500);
        };
    </script>
</body>
</html>
