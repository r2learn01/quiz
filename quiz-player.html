<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Player</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-gradient-1: #050505;
            --bg-gradient-2: #17181a;
            --bg-gradient-3: #070818;
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-border: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #0adaf1c7;
            --correct-color: #10b981; 
            --wrong-color: #ef4444;   
            --hover-bg: rgba(255, 255, 255, 0.04);
            --hover-border: rgba(0, 229, 255, 0.4);
            --hover-shadow: rgba(0, 229, 255, 0.15);
        }

        .light-mode {
            --bg-gradient-1: #f4f6f9;
            --bg-gradient-2: #e9ecef;
            --bg-gradient-3: #f1f3f5;
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-border: rgba(0, 0, 0, 0.05);
            --text-main: #2d3748;
            --text-muted: #718096;
            --accent-color: #4299e1;
            --hover-bg: rgba(255, 255, 255, 1);
            --hover-border: rgba(66, 153, 225, 0.4);
            --hover-shadow: rgba(66, 153, 225, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: linear-gradient(180deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3));
            background-attachment: fixed;
            color: var(--text-main);
            transition: all 0.5s ease;
            height: 100vh; /* منع سكرول الصفحة بالكامل */
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .top-nav {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            padding: 20px;
            z-index: 10;
            flex-shrink: 0;
        }

        .icon-btn {
            background: var(--card-bg);
            color: var(--text-muted);
            border: 1px solid var(--card-border);
            padding: 10px 18px;
            border-radius: 30px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            transition: 0.3s;
        }

        .icon-btn:hover {
            color: var(--accent-color);
            border-color: var(--accent-color);
            box-shadow: 0 0 10px var(--hover-shadow);
        }

        .quiz-container {
            width: 100%;
            max-width: 700px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 30px;
            margin-top: 10px;
            z-index: 1;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            /* التعديل السحري: طول متجاوب عشان الكارت ميخرجش برا الشاشة */
            max-height: calc(100vh - 100px); 
            display: flex;
            flex-direction: column;
        }

        #quiz-screen {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden; /* عشان المحتوى ميهربش برا الشاشة */
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--card-border);
            flex-shrink: 0;
        }

        .quiz-title { font-size: 1.1rem; font-weight: 600; color: var(--accent-color); }
        .question-tracker { font-size: 0.95rem; color: var(--text-muted); }

        .question-text {
            font-size: 1.3rem;
            font-weight: 500;
            margin-bottom: 20px;
            line-height: 1.5;
            flex-shrink: 0;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            /* السكرول بيحصل هنا بس لو الاختيارات كتير */
            overflow-y: auto; 
            padding-right: 5px;
            margin-bottom: 15px;
            flex-grow: 1; 
        }

        /* تجميل شريط السكرول الداخلي */
        .options-list::-webkit-scrollbar { width: 6px; }
        .options-list::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 10px; }

        .option-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 16px 20px;
            border-radius: 12px;
            font-size: 1.05rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .option-btn:hover:not(:disabled) {
            background: var(--hover-bg);
            border-color: var(--accent-color);
            transform: translateX(5px);
        }

        .option-btn.correct { background: rgba(16, 185, 129, 0.1); border-color: var(--correct-color); color: var(--correct-color); }
        .option-btn.wrong { background: rgba(239, 68, 68, 0.1); border-color: var(--wrong-color); color: var(--wrong-color); }

        .next-btn {
            background: var(--accent-color);
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            display: none;
            transition: 0.3s;
            flex-shrink: 0; /* بيمنع الزرار إنه يصغر */
            margin-top: auto; /* بيزقه لأسفل الكارت */
        }
        .next-btn:hover { box-shadow: 0 0 15px var(--accent-color); }

        .result-screen { text-align: center; display: none; }
        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid var(--accent-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0 auto 30px auto;
            color: var(--accent-color);
            box-shadow: 0 0 30px var(--hover-shadow);
            transition: all 0.3s ease; /* تعديل إضافي بسيط لتغيير اللون بنعومة */
        }

        /* تظبيطات الموبايل عشان الشاشة الصغيرة */
        @media (max-width: 600px) {
            .quiz-container { 
                padding: 20px 15px; 
                border-radius: 15px; 
                width: 95%; 
                max-height: calc(100vh - 80px); /* مساحة أكبر للموبايل */
            }
            .question-text { font-size: 1.1rem; margin-bottom: 15px; }
            .option-btn { font-size: 1rem; padding: 12px 15px; }
            .next-btn { padding: 12px 20px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="javascript:history.back()" class="icon-btn"><i class="fas fa-arrow-left"></i> Back</a>
        <button id="theme-toggle" class="icon-btn" title="Switch Theme"><i class="fas fa-sun"></i></button>
    </nav>

    <div class="quiz-container">
        <div id="quiz-screen">
            <div class="quiz-header">
                <span class="quiz-title" id="quiz-title">Loading...</span>
                <span class="question-tracker"><span id="current-q-num">1</span> / <span id="total-q-num">?</span></span>
            </div>
            
            <h2 class="question-text" id="question-text">Please wait...</h2>
            
            <div class="options-list" id="options-list">
                </div>
            
            <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next Question <i class="fas fa-arrow-right"></i></button>
        </div>

        <div class="result-screen" id="result-screen">
            <h2>Quiz Completed 🎉</h2>
            <p style="color: var(--text-muted); margin-bottom: 20px;">Here is your final score</p>
            
            <div class="score-circle" id="score-circle">
                <span id="final-score">0</span>%
            </div>
            
            <div style="display: flex; gap: 15px; justify-content: center;">
                <button class="icon-btn" onclick="location.reload()" style="background: var(--hover-bg); color: var(--text-main);"><i class="fas fa-redo"></i> Try Again</button>
                <button class="icon-btn" onclick="location.href='index.html'" style="border-color: var(--accent-color); color: var(--accent-color);"><i class="fas fa-home"></i> Home</button>
            </div>
        </div>
    </div>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            const icon = themeToggle.querySelector('i');
            icon.className = document.body.classList.contains('light-mode') ? 'fas fa-moon' : 'fas fa-sun';
        });

        // قاعدة بيانات الأسئلة
        const quizDatabase = {
            "org1": {
                title: "Quiz I",
                questions: [
                    { 
                        q: "Why does benzene prefer Electrophilic Substitution over Addition reactions?", 
                        options: ["Because it lacks double bonds", "To maintain its aromatic stability", "Because addition reactions are too fast", "Because it is a non-planar molecule"], 
                        correct: 1 
                    },
                    { 
                        q: "What are the four requirements for a compound to be classified as aromatic?", 
                        options: ["Cyclic, Planar, sp3 hybridized, obeys Huckel's rule", "Open chain, Planar, Fully conjugated, 4n electrons", "Cyclic, Planar, Fully conjugated (all sp2), obeys Huckel's rule (4n+2)", "Cyclic, Non-planar, conjugated, 6 electrons"], 
                        correct: 2 
                    },
                    { 
                        q: "Based on Huckel's rule, if a cyclic planar system has 6 π electrons, what is the value of 'n'?", 
                        options: ["n = 0", "n = 1", "n = 2", "n = 1.5"], 
                        correct: 1 
                    },
                    { 
                        q: "Which of the following describes the 'Anti-aromatic' compounds?", 
                        options: ["They fulfill the first 3 requirements but fail Huckel's rule (have 4n electrons)", "They fail to be cyclic", "They are more stable than aromatic compounds", "They contain sp3 hybridized carbons"], 
                        correct: 0 
                    },
                    { 
                        q: "Why is Cyclopentadiene considered to have acidic protons?", 
                        options: ["Because it is a strong mineral acid", "Because losing a proton forms a stable aromatic anion", "Because it is a non-cyclic compound", "Because it contains a nitrogen atom"], 
                        correct: 1 
                    },
                    { 
                        q: "The actual bond length of C-C in the benzene ring (⬢) is:", 
                        options: ["Equal to a single bond (1.54 Å)", "Equal to a double bond (1.33 Å)", "Intermediate between single and double bonds (1.40 Å)", "Longer than a single bond"], 
                        correct: 2 
                    },
                    { 
                        q: "Which molecule exists in a 'non-planar tub-shape' and is therefore non-aromatic?", 
                        options: ["Benzene", "Cyclobutadiene", "Cyclooctatetraene", "Pyrrole"], 
                        correct: 2 
                    },
                    { 
                        q: "What is the role of concentrated H2SO4 in the nitration of benzene?", 
                        options: ["It acts as a solvent only", "It acts as a catalyst to generate the nitronium ion (NO2+)", "It prevents the reaction from occurring", "It acts as a reducing agent"], 
                        correct: 1 
                    },
                    { 
                        q: "In the Electrophilic Substitution mechanism, the rate-determining step is:", 
                        options: ["Formation of the electrophile", "The loss of a proton to regenerate aromaticity", "The addition of the electrophile to form the sigma complex (carbocation)", "The reaction of benzene with a nucleophile"], 
                        correct: 2 
                    },
                    { 
                        q: "Which of the following groups is considered a 'Meta director' in benzene substitution?", 
                        options: ["-OH", "-CH3", "-NO2", "-NH2"], 
                        correct: 2 
                    },
                    { 
                        q: "Why does Toluene react 25 times faster than Benzene (⬢) in nitration?", 
                        options: ["The methyl group is an electron-withdrawing group", "The methyl group activates the ring by donating electron density", "Toluene is less stable than benzene", "Because Toluene is non-planar"], 
                        correct: 1 
                    },
                    { 
                        q: "The Tropylium cation (Cycloheptatrienyl cation) is highly stable because it is:", 
                        options: ["Anti-aromatic", "Aromatic with 6 π electrons", "Non-cyclic", "Saturated"], 
                        correct: 1 
                    },
                    { 
                        q: "Friedel-Crafts Alkylation cannot occur on a benzene ring that contains:", 
                        options: ["A methyl group", "A strong electron-withdrawing group like -NO2", "A halogen atom", "An ethyl group"], 
                        correct: 1 
                    },
                    { 
                        q: "Which of these is a disadvantage of Friedel-Crafts Alkylation?", 
                        options: ["It is too slow", "It only produces monoalkylated products", "Polyalkylation and carbocation rearrangement", "It requires no catalyst"], 
                        correct: 2 
                    },
                    { 
                        q: "Aryl halides are relatively unreactive toward SN2 reactions due to:", 
                        options: ["The presence of many protons", "Steric hindrance by the ring and the strength of the C-X bond", "The ring being too electron-rich", "The halogen being a good leaving group"], 
                        correct: 1 
                    }
                ]
            }

            // "ana1": {
            //     title: "Precipitation Titrations",
            //     q: [
            //         { q: "Which indicator is used in Mohr's method?", options: ["Fluorescein", "Ferric alum", "Potassium chromate", "Eriochrome Black T"], correct: 2 }
            //     ]
            // }
        };
        const urlParams = new URLSearchParams(window.location.search);
        const currentQuizId = urlParams.get('quiz');
        
        let questions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let answered = false;

        // دالة لغبطة (Shuffle) المصفوفة
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function initQuiz() {
            if (currentQuizId && quizDatabase[currentQuizId]) {
                const quizData = quizDatabase[currentQuizId];
                document.getElementById('quiz-title').textContent = quizData.title;
                
                // نسخ الأسئلة ولغبطتها عشان منأثرش على قاعدة البيانات الأصلية
                questions = [...quizData.questions];
                shuffleArray(questions);
                
                document.getElementById('total-q-num').textContent = questions.length;
                loadQuestion();
            } else {
                document.getElementById('question-text').textContent = "Quiz not found! Please go back.";
                document.getElementById('quiz-title').textContent = "Error";
            }
        }

        function loadQuestion() {
            answered = false;
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('current-q-num').textContent = currentQuestionIndex + 1;
            
            const currentQ = questions[currentQuestionIndex];
            document.getElementById('question-text').textContent = currentQ.q;
            
            const optionsList = document.getElementById('options-list');
            optionsList.innerHTML = ''; 
            
            currentQ.options.forEach((optionText, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `${optionText} <i class="fas fa-circle" style="font-size: 0.5rem; opacity: 0;"></i>`;
                btn.onclick = () => checkAnswer(index, btn);
                optionsList.appendChild(btn);
            });
            
            // التأكد إن السكرول يرجع لأول الاختيارات مع كل سؤال جديد
            optionsList.scrollTop = 0;
        }

        function checkAnswer(selectedIndex, selectedBtn) {
            if (answered) return; 
            answered = true;
            
            const currentQ = questions[currentQuestionIndex];
            const allBtns = document.querySelectorAll('.option-btn');
            
            allBtns.forEach(btn => btn.disabled = true);
            
            if (selectedIndex === currentQ.correct) {
                selectedBtn.classList.add('correct');
                selectedBtn.querySelector('i').className = "fas fa-check-circle";
                selectedBtn.querySelector('i').style.opacity = "1";
                score++;
            } else {
                selectedBtn.classList.add('wrong');
                selectedBtn.querySelector('i').className = "fas fa-times-circle";
                selectedBtn.querySelector('i').style.opacity = "1";
                
                const correctBtn = allBtns[currentQ.correct];
                correctBtn.classList.add('correct');
                correctBtn.querySelector('i').className = "fas fa-check-circle";
                correctBtn.querySelector('i').style.opacity = "1";
            }
            
            const nextBtn = document.getElementById('next-btn');
            if (currentQuestionIndex === questions.length - 1) {
                nextBtn.innerHTML = "Show Results <i class='fas fa-flag-checkered'></i>";
            }
            nextBtn.style.display = 'block';
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            
            const percentage = Math.round((score / questions.length) * 100);
            document.getElementById('final-score').textContent = percentage;

            // تحديد اللون بناءً على النتيجة
            const scoreCircle = document.getElementById('score-circle');
            let color = "";
            
            if (percentage < 50) {
                color = "#ef4444"; // أحمر
            } else if (percentage >= 50 && percentage < 75) {
                color = "#f97316"; // برتقالي
            } else if (percentage >= 75 && percentage < 90) {
                color = "#3b82f6"; // أزرق
            } else {
                color = "#10b981"; // أخضر
            }

            // تطبيق اللون
            scoreCircle.style.borderColor = color;
            scoreCircle.style.color = color;
            scoreCircle.style.boxShadow = `0 0 30px ${color}50`;
        }

        window.onload = initQuiz;
    </script>
</body>
</html>
