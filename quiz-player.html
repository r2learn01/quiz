<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Player</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-gradient-1: #050505;
            --bg-gradient-2: #17181a;
            --bg-gradient-3: #070818;
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-border: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #0adaf1c7;
            --correct-color: #10b981; 
            --wrong-color: #ef4444;   
            --hover-bg: rgba(255, 255, 255, 0.04);
            --hover-border: rgba(0, 229, 255, 0.4);
            --hover-shadow: rgba(0, 229, 255, 0.15);
        }

        .light-mode {
            --bg-gradient-1: #f4f6f9;
            --bg-gradient-2: #e9ecef;
            --bg-gradient-3: #f1f3f5;
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-border: rgba(0, 0, 0, 0.05);
            --text-main: #2d3748;
            --text-muted: #718096;
            --accent-color: #4299e1;
            --hover-bg: rgba(255, 255, 255, 1);
            --hover-border: rgba(66, 153, 225, 0.4);
            --hover-shadow: rgba(66, 153, 225, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: linear-gradient(180deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3));
            background-attachment: fixed;
            color: var(--text-main);
            transition: all 0.5s ease;
            height: 100vh;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .top-nav {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            padding: 20px;
            z-index: 10;
        }

        .icon-btn {
            background: var(--card-bg);
            color: var(--text-muted);
            border: 1px solid var(--card-border);
            padding: 10px 18px;
            border-radius: 30px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            transition: 0.3s;
        }

        .icon-btn:hover {
            color: var(--accent-color);
            border-color: var(--accent-color);
            box-shadow: 0 0 10px var(--hover-shadow);
        }

        .quiz-container {
            width: 100%;
            max-width: 700px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 30px;
            margin-top: 10px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-height: calc(100vh - 100px); 
            display: flex;
            flex-direction: column;
        }

        /* Loading Screen */
        .loader-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            border-radius: 20px;
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: var(--accent-color);
        }

        .spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(10, 218, 241, 0.1);
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Explanation Box */
        .explanation-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-gradient-2);
            border: 2px solid var(--accent-color);
            border-radius: 20px;
            z-index: 90;
            padding: 40px 25px;
            overflow-y: auto;
        }

        .close-exp {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--wrong-color);
        }

        #quiz-screen {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--card-border);
        }

        .quiz-title { font-size: 1.1rem; font-weight: 600; color: var(--accent-color); }
        .question-tracker { font-size: 0.95rem; color: var(--text-muted); }

        .question-text {
            font-size: 1.3rem;
            font-weight: 500;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto; 
            padding-right: 5px;
            margin-bottom: 15px;
            flex-grow: 1; 
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 16px 20px;
            border-radius: 12px;
            font-size: 1.05rem;
            text-align: left;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .option-btn:hover:not(:disabled) {
            background: var(--hover-bg);
            border-color: #4e64a3;
            /* transform: translateX(1px); */
        }

        .option-btn.correct { background: rgba(16, 185, 129, 0.1); border-color: var(--correct-color); color: var(--correct-color); }
        .option-btn.wrong { background: rgba(239, 68, 68, 0.1); border-color: var(--wrong-color); color: var(--wrong-color); }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }

        .next-btn, .explain-trigger-btn {
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: none;
            border: none;
        }

        .next-btn { background: var(--accent-color); color: #000; flex: 2; }
        .explain-trigger-btn { background: transparent; border: 1px solid var(--accent-color); color: var(--accent-color); flex: 1; }

        .result-screen { text-align: center; display: none; }
        .score-circle {
            width: 150px; height: 150px;
            border-radius: 50%;
            border: 5px solid var(--accent-color);
            display: flex; justify-content: center; align-items: center;
            font-size: 2.5rem; font-weight: 700;
            margin: 0 auto 30px auto;
            color: var(--accent-color);
        }

        /* تحسينات الموبايل هنا */
        @media (max-width: 600px) {
            .quiz-container { 
                width: 95%; 
                padding: 15px; 
                max-height: calc(100vh - 80px); /* مساحة أوسع قليلاً للشاشات الصغيرة */
            }
            .question-text { 
                font-size: 1.1rem; 
                margin-bottom: 15px; 
            }
            .option-btn { 
                padding: 12px 15px; 
                font-size: 0.95rem; 
            }
            .btn-group { 
                flex-direction: column; 
                gap: 8px; 
            }
            .explanation-overlay { 
                padding: 20px 15px; 
            }
            .next-btn, .explain-trigger-btn {
                padding: 12px;
            }
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="javascript:history.back()" class="icon-btn"><i class="fas fa-arrow-left"></i> Back</a>
        <button id="theme-toggle" class="icon-btn"><i class="fas fa-sun"></i></button>
    </nav>

    <div class="quiz-container">
        <div class="loader-overlay" id="loading-screen">
            <div class="spinner"></div>
            <p>Generating Explanation...</p>
        </div>

        <div class="explanation-overlay" id="explanation-view">
            <span class="close-exp" onclick="toggleExplanation(false)">&times; </span>
            <h3 style="color: var(--accent-color); margin-bottom: 15px;"><i class="fas fa-brain"></i> Explanation</h3>
            <p id="exp-content" style="line-height: 1.6; font-size: 1.1rem;"></p>
            <p id="exp-source" style="margin-top: 20px; font-size: 0.9rem; color: var(--text-muted); font-style: italic;"></p>
        </div>

        <div id="quiz-screen">
            <div class="quiz-header">
                <span class="quiz-title" id="quiz-title">Loading...</span>
                <span class="question-tracker"><span id="current-q-num">1</span> / <span id="total-q-num">?</span></span>
            </div>
            
            <h2 class="question-text" id="question-text">Please wait...</h2>
            
            <div class="options-list" id="options-list"></div>
            
            <div class="btn-group">
            <button class="explain-trigger-btn" id="explain-btn" onclick="handleExplain()">Explain <i class="fas fa-robot"></i></button>
            <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next Question <i class="fas fa-arrow-right"></i></button>
            </div>
        </div>

        <div class="result-screen" id="result-screen">
            <h2>Quiz Completed 🎉</h2>
            <div class="score-circle" id="score-circle"><span id="final-score">0</span>%</div>
            <button class="icon-btn" onclick="location.reload()" style="margin: 0 auto;"><i class="fas fa-redo"></i> Restart</button>
        </div>
    </div>

        const urlParams = new URLSearchParams(window.location.search);
        const currentQuizId = urlParams.get('quiz');
        let questions = [], currentIdx = 0, score = 0, answered = false;

        function init() {
            if (currentQuizId && quizDatabase[currentQuizId]) {
                const data = quizDatabase[currentQuizId];
                document.getElementById('quiz-title').textContent = data.title;
                
                // تم إضافة هذا السطر لترتيب الأسئلة عشوائياً في كل مرة
                questions = [...data.questions].sort(() => Math.random() - 0.5);
                
                document.getElementById('total-q-num').textContent = questions.length;
                loadQ();
            }
        }

        function loadQ() {
            answered = false;
            toggleExplanation(false);
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('explain-btn').style.display = 'none';
            document.getElementById('current-q-num').textContent = currentIdx + 1;
            
            const q = questions[currentIdx];
            document.getElementById('question-text').textContent = q.q;
            const list = document.getElementById('options-list');
            list.innerHTML = '';
            
            q.options.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.innerHTML = `${opt} <i class="fas fa-circle" style="opacity:0"></i>`;
                b.onclick = () => check(i, b);
                list.appendChild(b);
            });
        }

        function check(idx, btn) {
            if (answered) return;
            answered = true;
            const q = questions[currentIdx];
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach(b => b.disabled = true);

            if (idx === q.correct) {
                btn.classList.add('correct');
                score++;
            } else {
                btn.classList.add('wrong');
                btns[q.correct].classList.add('correct');
            }
            document.getElementById('next-btn').style.display = 'block';
            document.getElementById('explain-btn').style.display = 'block';
        }

        function handleExplain() {
            const loader = document.getElementById('loading-screen');
            loader.style.display = 'flex';
            
            setTimeout(() => {
                loader.style.display = 'none';
                const q = questions[currentIdx];
                document.getElementById('exp-content').textContent = q.explanation;
                document.getElementById('exp-source').textContent = "Reference: " + q.source;
                toggleExplanation(true);
            }, 3000);
        }

        function toggleExplanation(show) {
            document.getElementById('explanation-view').style.display = show ? 'block' : 'none';
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < questions.length) loadQ();
            else finish();
        }

        function finish() {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('final-score').textContent = Math.round((score/questions.length)*100);
        }

        window.onload = init;
        document.getElementById('theme-toggle').onclick = () => document.body.classList.toggle('light-mode');
    </script>
</body>
