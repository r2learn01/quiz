<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Player</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-gradient-1: #050505;
            --bg-gradient-2: #17181a;
            --bg-gradient-3: #070818;
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-border: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #0adaf1c7;
            --correct-color: #10b981; 
            --wrong-color: #ef4444;   
            --hover-bg: rgba(255, 255, 255, 0.04);
            --hover-border: rgba(0, 229, 255, 0.4);
            --hover-shadow: rgba(0, 229, 255, 0.15);
        }

        .light-mode {
            --bg-gradient-1: #f4f6f9;
            --bg-gradient-2: #e9ecef;
            --bg-gradient-3: #f1f3f5;
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-border: rgba(0, 0, 0, 0.05);
            --text-main: #2d3748;
            --text-muted: #718096;
            --accent-color: #4299e1;
            --hover-bg: rgba(255, 255, 255, 1);
            --hover-border: rgba(66, 153, 225, 0.4);
            --hover-shadow: rgba(66, 153, 225, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: linear-gradient(180deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3));
            background-attachment: fixed;
            color: var(--text-main);
            transition: all 0.5s ease;
            height: 100vh;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .top-nav {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            padding: 20px;
            z-index: 10;
        }

        .icon-btn {
            background: var(--card-bg);
            color: var(--text-muted);
            border: 1px solid var(--card-border);
            padding: 10px 18px;
            border-radius: 30px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            transition: 0.3s;
        }

        .icon-btn:hover {
            color: var(--accent-color);
            border-color: var(--accent-color);
            box-shadow: 0 0 10px var(--hover-shadow);
        }

        .quiz-container {
            width: 100%;
            max-width: 700px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 30px;
            margin-top: 10px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-height: calc(100vh - 100px); 
            display: flex;
            flex-direction: column;
        }

        /* Loading Screen */
        .loader-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            border-radius: 20px;
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: var(--accent-color);
        }

        .spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(10, 218, 241, 0.1);
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Explanation Box */
        .explanation-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-gradient-2);
            border: 2px solid var(--accent-color);
            border-radius: 20px;
            z-index: 90;
            padding: 40px 25px;
            overflow-y: auto;
        }

        .close-exp {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--wrong-color);
        }

        #quiz-screen {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--card-border);
        }

        .quiz-title { font-size: 1.1rem; font-weight: 600; color: var(--accent-color); }
        .question-tracker { font-size: 0.95rem; color: var(--text-muted); }

        .question-text {
            font-size: 1.3rem;
            font-weight: 500;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto; 
            padding-right: 5px;
            margin-bottom: 15px;
            flex-grow: 1; 
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 16px 20px;
            border-radius: 12px;
            font-size: 1.05rem;
            text-align: left;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .option-btn:hover:not(:disabled) {
            background: var(--hover-bg);
            border-color: var(--accent-color);
            transform: translateX(5px);
        }

        .option-btn.correct { background: rgba(16, 185, 129, 0.1); border-color: var(--correct-color); color: var(--correct-color); }
        .option-btn.wrong { background: rgba(239, 68, 68, 0.1); border-color: var(--wrong-color); color: var(--wrong-color); }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }

        .next-btn, .explain-trigger-btn {
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: none;
            border: none;
        }

        .next-btn { background: var(--accent-color); color: #000; flex: 2; }
        .explain-trigger-btn { background: transparent; border: 1px solid var(--accent-color); color: var(--accent-color); flex: 1; }

        .result-screen { text-align: center; display: none; }
        .score-circle {
            width: 150px; height: 150px;
            border-radius: 50%;
            border: 5px solid var(--accent-color);
            display: flex; justify-content: center; align-items: center;
            font-size: 2.5rem; font-weight: 700;
            margin: 0 auto 30px auto;
            color: var(--accent-color);
        }

        /* تحسينات الموبايل هنا */
        @media (max-width: 600px) {
            .quiz-container { 
                width: 95%; 
                padding: 15px; 
                max-height: calc(100vh - 80px); /* مساحة أوسع قليلاً للشاشات الصغيرة */
            }
            .question-text { 
                font-size: 1.1rem; 
                margin-bottom: 15px; 
            }
            .option-btn { 
                padding: 12px 15px; 
                font-size: 0.95rem; 
            }
            .btn-group { 
                flex-direction: column; 
                gap: 8px; 
            }
            .explanation-overlay { 
                padding: 20px 15px; 
            }
            .next-btn, .explain-trigger-btn {
                padding: 12px;
            }
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="javascript:history.back()" class="icon-btn"><i class="fas fa-arrow-left"></i> Back</a>
        <button id="theme-toggle" class="icon-btn"><i class="fas fa-sun"></i></button>
    </nav>

    <div class="quiz-container">
        <div class="loader-overlay" id="loading-screen">
            <div class="spinner"></div>
            <p>Generating Explanation...</p>
        </div>

        <div class="explanation-overlay" id="explanation-view">
            <span class="close-exp" onclick="toggleExplanation(false)">&times; </span>
            <h3 style="color: var(--accent-color); margin-bottom: 15px;"><i class="fas fa-brain"></i> Explanation</h3>
            <p id="exp-content" style="line-height: 1.6; font-size: 1.1rem;"></p>
            <p id="exp-source" style="margin-top: 20px; font-size: 0.9rem; color: var(--text-muted); font-style: italic;"></p>
        </div>

        <div id="quiz-screen">
            <div class="quiz-header">
                <span class="quiz-title" id="quiz-title">Loading...</span>
                <span class="question-tracker"><span id="current-q-num">1</span> / <span id="total-q-num">?</span></span>
            </div>
            
            <h2 class="question-text" id="question-text">Please wait...</h2>
            
            <div class="options-list" id="options-list"></div>
            
            <div class="btn-group">
            <button class="explain-trigger-btn" id="explain-btn" onclick="handleExplain()">Explain <i class="fas fa-robot"></i></button>
            <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next Question <i class="fas fa-arrow-right"></i></button>
            </div>
        </div>

        <div class="result-screen" id="result-screen">
            <h2>Quiz Completed 🎉</h2>
            <div class="score-circle" id="score-circle"><span id="final-score">0</span>%</div>
            <button class="icon-btn" onclick="location.reload()" style="margin: 0 auto;"><i class="fas fa-redo"></i> Restart</button>
        </div>
    </div>

    <script>
        
         const quizDatabase = {
            "org1": {
                title: "Quiz I | Midterm Content",
                questions: [
                    { 
                        q: "Why does nitration of Aniline in concentrated H2SO4/HNO3 yield a significant amount of m-nitroaniline despite -NH2 being o,p-directing?", 
                        options: ["Direct oxidation of the ring", "Formation of the anilinium ion (-NH3+)", "Steric hindrance at ortho positions", "The amino group becomes an electron drawer by resonance"], 
                        correct: 1,
                        explanation: "In strongly acidic conditions, the amino group (-NH2) gets protonated to form the anilinium ion (-NH3+). This group is a powerful electron-withdrawing group via induction (-I), which deactivates the ring and directs the next substituent to the meta position.",
                        source: "Lecture 4: Aromatic Amines - Reactions"
                    },
                    { 
                        q: "In the Aldol condensation between Benzaldehyde and Acetone, Benzaldehyde cannot act as the nucleophile. Why?", 
                        options: ["It is too stable due to aromaticity", "It lacks alpha-hydrogens to form an enolate", "The carbonyl carbon is too shielded", "It reacts faster with itself (Cannizzaro)"], 
                        correct: 1,
                        explanation: "Aldol condensation requires the formation of an enolate ion via the removal of an alpha-hydrogen. Benzaldehyde has no hydrogen atoms on the carbon adjacent to the carbonyl group, so it can only serve as the electrophile for another enolate to attack.",
                        source: "Lecture 6: Aldehydes & Ketones - Condensations"
                    },
                    { 
                        q: "Which of these molecules will have the HIGHEST resonance energy (greatest stability)?", 
                        options: ["1,3,5-Cyclohexatriene (Kekule structure)", "Benzene", "Cyclooctatetraene", "Cyclobutadiene"], 
                        correct: 1,
                        explanation: "Benzene is a perfectly delocalized 6-pi electron system that meets Hückel's 4n+2 rule. Its resonance energy (approx 36 kcal/mol) makes it significantly more stable than non-aromatic or anti-aromatic cyclic polyenes.",
                        source: "Lecture 1: Aromaticity & Stability"
                    },
                    { 
                        q: "During the synthesis of Phenol from Chlorobenzene using NaOH at 350°C, which intermediate is formed?", 
                        options: ["Carbocation", "Meisenheimer Complex", "Benzyne (dehydrobenzene)", "Free Radical"], 
                        correct: 2,
                        explanation: "The high temperature/pressure reaction of aryl halides with strong bases (Elimination-Addition) proceeds through a 'Benzyne' intermediate where a triple bond is momentarily formed in the ring.",
                        source: "Lecture 3: Synthesis of Phenols"
                    },
                
                            
                { 
                    q: "Why is Cyclooctatetraene (COT) non-aromatic despite being a cyclic, conjugated system with 8 π electrons?", 
                    options: ["It follows Hückel's 4n+2 rule where n=1.5", "It adopts a non-planar 'tub' shape to avoid anti-aromatic destabilization", "The π electrons are too far apart to overlap", "It is actually aromatic but very reactive"], 
                    correct: 1,
                    explanation: "According to Hückel's rule, a planar 8 π electron system would be anti-aromatic (4n). To avoid this high-energy state, COT distorts into a non-planar tub shape, making it non-aromatic rather than anti-aromatic.",
                    source: "Lecture 1: Aromaticity - Hückel's Rule Limitations"
                },
                { 
                    q: "In the Nucleophilic Aromatic Substitution (SnAr) of 2,4-dinitrochlorobenzene with NaOCH3, what is the rate-determining step?", 
                    options: ["Loss of the Chloride leaving group", "Formation of the anionic Meisenheimer complex", "Protonation of the ring", "Rearrangement of the nitro groups"], 
                    correct: 1,
                    explanation: "Unlike Sn1/Sn2, SnAr proceeds via an addition-elimination mechanism. The first step, where the nucleophile attacks to form the resonance-stabilized Meisenheimer complex, breaks the aromaticity and is the slowest (rate-determining) step.",
                    source: "Lecture 2: Nucleophilic Aromatic Substitution (SnAr)"
                },
                { 
                    q: "Why does o-Nitrophenol have a lower boiling point and lower water solubility than p-Nitrophenol?", 
                    options: ["o-Nitrophenol has a higher molecular weight", "Intramolecular hydrogen bonding in the ortho isomer", "Intermolecular hydrogen bonding in the ortho isomer", "The para isomer is more volatile due to symmetry"], 
                    correct: 1,
                    explanation: "In o-nitrophenol, the hydroxyl group forms an 'intramolecular' hydrogen bond with the adjacent nitro group. This reduces its ability to form 'intermolecular' bonds with water or other molecules, leading to lower solubility and higher volatility (steam-distillable).",
                    source: "Lecture 3: Phenols - Physical Properties"
                },
                { 
                    q: "What is the product formed when Benzaldehyde is treated with 50% NaOH (Cannizzaro Reaction), and why?", 
                    options: ["Benzyl alcohol and Sodium benzoate; because it lacks alpha-hydrogens", "Cinnamic acid; via enolate formation", "Aldol adduct; via nucleophilic attack", "Benzene and Formic acid; via decarboxylation"], 
                    correct: 0,
                    explanation: "Aldehydes without alpha-hydrogens (like Benzaldehyde) cannot form enolates. Instead, they undergo self oxidation-reduction (disproportionation) where one molecule is reduced to an alcohol and the other is oxidized to a salt of a carboxylic acid.",
                    source: "Lecture 6: Aldehydes & Ketones - Cannizzaro Reaction"
                },
                { 
                    q: "Which of the following factors makes N,N-Dimethyl-o-toluidine a stronger base than N,N-Dimethylaniline?", 
                    options: ["The inductive effect (+I) of the methyl group", "Steric Inhibition of Resonance (SIR)", "Hyperconjugation of the ortho-methyl group", "Decreased s-character of the lone pair"], 
                    correct: 1,
                    explanation: "The ortho-methyl group creates steric hindrance that forces the dimethylamino group out of the plane of the ring. This prevents the lone pair from delocalizing into the ring via resonance, keeping it localized on Nitrogen and more available for protons.",
                    source: "Lecture 4: Aromatic Amines - Basicity & SIR Effect"
                },
                { 
                    q: "During the Reimer-Tiemann reaction of Phenol with CHCl3/KOH, what is the reactive electrophile generated in situ?", 
                    options: ["Carbocation (:CH2+)", "Dichlorocarbene (:CCl2)", "Trichloromethyl anion (CCl3-)", "Chloroform radical"], 
                    correct: 1,
                    explanation: "The reaction of Chloroform (CHCl3) with a strong base (KOH) undergoes alpha-elimination to produce Dichlorocarbene (:CCl2). This neutral but highly electron-deficient species acts as the electrophile that attacks the phenoxide ring.",
                    source: "Lecture 3: Reactions of Phenols"
                }
                ]   
            },
            
            "ana1": {
                title: "Quiz I | Midterm Content",
                questions: [
                    { 
                        q: "Which of the following is a characteristic requirement for a primary standard?", 
                        options: ["Low equivalent weight", "High purity and definite known composition", "Must be standardized before use", "Highly hygroscopic"], 
                        correct: 1,
                        explanation: "A primary standard must be extremely pure (99.9%+) and have a stable, known composition so that the number of moles can be calculated accurately by weight.",
                        source: "Lecture 1: Introduction to Volumetric Analysis"
                    },
                    { 
                        q: "The pH of a salt solution formed from a strong acid and a weak base (e.g., NH4Cl) is:", 
                        options: ["Exactly 7", "Less than 7 (acidic)", "Greater than 7 (alkaline)", "Depends on temperature"], 
                        correct: 1,
                        explanation: "NH4Cl dissociates into NH4+ and Cl-. The NH4+ (conjugate acid of a weak base) reacts with water (hydrolysis) to produce H3O+, making the solution acidic.",
                        source: "Lecture 3: pH of Salt Solutions"
                    },
                    { 
                        q: "A buffer solution shows its maximum buffering capacity when:", 
                        options: ["pH = pKw", "pH = pKa ± 1", "pH = pKa", "Salt concentration is zero"], 
                        correct: 2,
                        explanation: "According to the Henderson-Hasselbalch equation, when [Salt] = [Acid], the log term becomes zero, and pH = pKa. This is where the buffer is most resistant to change.",
                        source: "Lecture 3: Buffer Solutions"
                    },
                    { 
                        q: "During the titration of boric acid, glycerol is added to:", 
                        options: ["Act as an indicator", "Prevent precipitation", "Enhance its acidity", "Neutralize the base"], 
                        correct: 2,
                        explanation: "Boric acid is too weak to be titrated directly. Glycerol reacts with it to form a complex 'Glyceroboric acid' which is a much stronger acid and can be titrated with NaOH.",
                        source: "Lecture 4: Titration of Weak Acids"
                    },
                    { 
                        q: "In the double indicator titration of Na2CO3, the first end point (pH 8.3) is detected by:", 
                        options: ["Methyl orange", "Phenolphthalein", "Bromothymol blue", "Litmus"], 
                        correct: 1,
                        explanation: "Phenolphthalein has a range of 8.2-10. It changes from pink to colorless exactly when Na2CO3 is converted to NaHCO3 (the first half-neutralization).",
                        source: "Lecture 4: Mixtures of Carbonates"
                    },
                    { 
                        q: "Why is ether used in the biphasic titration of sodium salicylate?", 
                        options: ["As a solvent for salt", "To extract formed salicylic acid", "As a primary standard", "To change pH"], 
                        correct: 1,
                        explanation: "Salicylic acid is insoluble in water but highly soluble in ether. Removing it from the water layer prevents a 'false early end point' caused by the acid's own acidity.",
                        source: "Lecture 5: Biphasic Titrations"
                    },
                    { 
                        q: "A blank determination is mainly carried out in back titrations to:", 
                        options: ["Speed up reaction", "Minimize titration errors", "Dissolve the sample", "Standardize HCl"], 
                        correct: 1,
                        explanation: "A blank titration is done without the sample to account for any impurities in reagents or environmental factors, ensuring the 'excess' titrant calculation is precise.",
                        source: "Lecture 5: Residual Titrations"
                    }
                ]
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const currentQuizId = urlParams.get('quiz');
        let questions = [], currentIdx = 0, score = 0, answered = false;

        function init() {
            if (currentQuizId && quizDatabase[currentQuizId]) {
                const data = quizDatabase[currentQuizId];
                document.getElementById('quiz-title').textContent = data.title;
                
                // تم إضافة هذا السطر لترتيب الأسئلة عشوائياً في كل مرة
                questions = [...data.questions].sort(() => Math.random() - 0.5);
                
                document.getElementById('total-q-num').textContent = questions.length;
                loadQ();
            }
        }

        function loadQ() {
            answered = false;
            toggleExplanation(false);
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('explain-btn').style.display = 'none';
            document.getElementById('current-q-num').textContent = currentIdx + 1;
            
            const q = questions[currentIdx];
            document.getElementById('question-text').textContent = q.q;
            const list = document.getElementById('options-list');
            list.innerHTML = '';
            
            q.options.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.innerHTML = `${opt} <i class="fas fa-circle" style="opacity:0"></i>`;
                b.onclick = () => check(i, b);
                list.appendChild(b);
            });
        }

        function check(idx, btn) {
            if (answered) return;
            answered = true;
            const q = questions[currentIdx];
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach(b => b.disabled = true);

            if (idx === q.correct) {
                btn.classList.add('correct');
                score++;
            } else {
                btn.classList.add('wrong');
                btns[q.correct].classList.add('correct');
            }
            document.getElementById('next-btn').style.display = 'block';
            document.getElementById('explain-btn').style.display = 'block';
        }

        function handleExplain() {
            const loader = document.getElementById('loading-screen');
            loader.style.display = 'flex';
            
            setTimeout(() => {
                loader.style.display = 'none';
                const q = questions[currentIdx];
                document.getElementById('exp-content').textContent = q.explanation;
                document.getElementById('exp-source').textContent = "Reference: " + q.source;
                toggleExplanation(true);
            }, 3000);
        }

        function toggleExplanation(show) {
            document.getElementById('explanation-view').style.display = show ? 'block' : 'none';
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < questions.length) loadQ();
            else finish();
        }

        function finish() {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('final-score').textContent = Math.round((score/questions.length)*100);
        }

        window.onload = init;
        document.getElementById('theme-toggle').onclick = () => document.body.classList.toggle('light-mode');
    </script>
</body>
</html>
