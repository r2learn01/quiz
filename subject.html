<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Quizzes </title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* نفس الألوان الأساسية اللي اخترتها */
        :root {
            --bg-gradient-1: #050505;
            --bg-gradient-2: #17181a;
            --bg-gradient-3: #070818;
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-border: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #0adaf1c7;
            --hover-bg: rgba(255, 255, 255, 0.04);
            --hover-border: rgba(0, 229, 255, 0.4);
            --hover-shadow: rgba(0, 229, 255, 0.15);
            --paper-color: rgba(255, 255, 255, 0.192);
        }

        .light-mode {
            --bg-gradient-1: #f4f6f9;
            --bg-gradient-2: #e9ecef;
            --bg-gradient-3: #f1f3f5;
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-border: rgba(0, 0, 0, 0.05);
            --text-main: #2d3748;
            --text-muted: #718096;
            --accent-color: #4299e1;
            --hover-bg: rgba(255, 255, 255, 1);
            --hover-border: rgba(66, 153, 225, 0.4);
            --hover-shadow: rgba(66, 153, 225, 0.1);
            --paper-color: rgba(54, 52, 52, 0.452);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(180deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3));
            background-size: 200% 200%;
            background-attachment: fixed;
            animation: gradientMove 20s ease infinite;
            color: var(--text-main);
            transition: background 0.5s ease, color 0.5s ease;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .falling-paper {
            position: fixed;
            width: 10px;
            height: 14px;
            background: var(--paper-color);
            z-index: 0;
            pointer-events: none;
            border-radius: 2px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 0; }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { transform: translateY(105vh) rotate(360deg) translateX(50px); opacity: 0; }
        }

        .main-container {
            width: 100%;
            max-width: 900px; /* عرض أقل شوية عشان القائمة تكون ملمومة */
            padding: 20px;
            z-index: 1;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
        }

        .back-btn {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            background: var(--card-bg);
            padding: 10px 18px;
            border-radius: 30px;
            border: 1px solid var(--card-border);
        }

        .back-btn:hover {
            color: var(--accent-color);
            border-color: var(--accent-color);
            box-shadow: 0 0 10px var(--hover-shadow);
        }

        #theme-toggle {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--card-border);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        #theme-toggle:hover {
            color: var(--accent-color);
            border-color: var(--accent-color);
            background: var(--card-bg);
            box-shadow: 0 0 10px var(--hover-shadow);
        }

        header {
            text-align: center;
            margin: 20px 0 40px 0;
        }

        .subject-icon {
            font-size: 3.5rem;
            color: var(--accent-color);
            margin-bottom: 15px;
            text-shadow: 0 0 20px var(--hover-shadow);
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        /* تنسيق قائمة الكويزات */
        .quiz-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 60px;
        }

        .quiz-item {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            padding: 20px 25px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .quiz-item:hover {
            transform: translate(10px); /* حركة لليمين مع الهوفر */
            background: var(--hover-bg);
            border-color: var(--hover-border);
            box-shadow: 0 8px 20px var(--hover-shadow);
        }

        .quiz-info h3 {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        .quiz-info p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .quiz-meta {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .question-count {
            background: rgba(10, 218, 241, 0.1);
            color: var(--accent-color);
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 8px;
            font-weight: 600;
        }

        .play-icon {
            font-size: 1.5rem;
            color: var(--text-muted);
            transition: all 0.3s ease;
        }

        .quiz-item:hover .play-icon {
            color: var(--accent-color);
            transform: scale(1.2);
        }

        /* رسالة لو المادة لسه مفيهاش كويزات */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .subject-icon { font-size: 2.5rem; }
            .quiz-item { flex-direction: column; align-items: flex-start; gap: 15px; }
            .quiz-meta { width: 100%; justify-content: space-between; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <nav class="top-nav">
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
            <button id="theme-toggle" title="Switch Theme"><i class="fas fa-sun"></i></button>
        </nav>

        <header>
            <i class="subject-icon fas fa-book" id="subject-icon"></i>
            <h1 id="subject-title">Loading...</h1>
            <p style="color: var(--text-muted);">Select a quiz to start practicing</p>
        </header>

        <main class="quiz-list" id="quiz-container">
            </main>
    </div>

    <script>
        // 1. نظام تبديل الوضع (ليلي / فاتح)
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            const icon = themeToggle.querySelector('i');
            icon.className = document.body.classList.contains('light-mode') ? 'fas fa-moon' : 'fas fa-sun';
        });

        // 2. نظام أنميشن الأوراق
        function createPaper() {
            const paper = document.createElement('div');
            paper.className = 'falling-paper';
            paper.style.left = Math.random() * 100 + 'vw';
            const duration = (Math.random() * 8 + 8); 
            paper.style.animationDuration = duration + 's';
            document.body.appendChild(paper);
            setTimeout(() => { paper.remove(); }, duration * 1000);
        }
        setInterval(createPaper, 500);

        // ==========================================
        // 3. المحرك الذكي للصفحة (The Logic)
        // ==========================================

        // دي "قاعدة البيانات" المؤقتة اللي فيها تفاصيل كل مادة والكويزات بتاعتها
        const subjectsData = {
            organic: {
                title: "Organic Chemistry II",
                icon: "fas fa-flask",
                quizzes: [
                    { id: "org_ch1", title: "Chapter 1: Alcohols & Phenols", desc: "Nomenclature, properties, and reactions.", questions: 25 },
                    { id: "org_ch2", title: "Chapter 2: Ethers & Epoxides", desc: "Synthesis and cleavage reactions.", questions: 15 },
                    { id: "org_mid", title: "Midterm Full Review", desc: "Comprehensive test for the midterm exam.", questions: 40 }
                ]
            },
            analytical: {
                title: "Analytical Chemistry II",
                icon: "fas fa-microscope",
                quizzes: [
                    { id: "ana_ch1", title: "Precipitation Titrations", desc: "Mohr, Volhard, and Fajan methods.", questions: 20 },
                    { id: "ana_ch2", title: "Complexometric Titrations", desc: "EDTA and masking agents.", questions: 18 }
                ]
            },
            pharmacognosy: {
                title: "Pharmacognosy",
                icon: "fas fa-leaf",
                quizzes: [
                    { id: "cog_leaves", title: "Medicinal Leaves", desc: "Senna, Belladonna, and Digitalis.", questions: 30 }
                ]
            },
            // تقدر تضيف باقي المواد هنا بنفس الطريقة (physical, anatomy, english, it)
        };

        // استخراج الـ ID بتاع المادة من الرابط (مثلاً: subject.html?id=organic)
        const urlParams = new URLSearchParams(window.location.search);
        const currentSubjectId = urlParams.get('id');

        // تجهيز عناصر الصفحة
        const titleElement = document.getElementById('subject-title');
        const iconElement = document.getElementById('subject-icon');
        const containerElement = document.getElementById('quiz-container');

        // التأكد إن المادة موجودة في الداتا بتاعتنا
        if (currentSubjectId && subjectsData[currentSubjectId]) {
            const subject = subjectsData[currentSubjectId];
            
            // تغيير اسم وأيقونة الصفحة
            titleElement.textContent = subject.title;
            iconElement.className = `subject-icon ${subject.icon}`;
            document.title = `${subject.title} - Quizzes`;

            // رسم قائمة الكويزات
            if (subject.quizzes.length > 0) {
                subject.quizzes.forEach(quiz => {
                    // هنا بنعمل رابط الكويز اللي هيروح لصفحة المحرك (quiz-player.html)
                    const quizHTML = `
                        <div class="quiz-item" onclick="location.href='quiz-player.html?quiz=${quiz.id}'">
                            <div class="quiz-info">
                                <h3>${quiz.title}</h3>
                                <p>${quiz.desc}</p>
                            </div>
                            <div class="quiz-meta">
                                <span class="question-count">${quiz.questions} Qs</span>
                                <i class="fas fa-play-circle play-icon"></i>
                            </div>
                        </div>
                    `;
                    containerElement.innerHTML += quizHTML;
                });
            } else {
                containerElement.innerHTML = `<div class="empty-state"><h3>Coming Soon!</h3><p>Quizzes for this subject are being prepared.</p></div>`;
            }

        } else {
            // لو الرابط غلط أو المادة مش موجودة
            titleElement.textContent = "Subject Not Found";
            iconElement.className = "subject-icon fas fa-exclamation-triangle";
            containerElement.innerHTML = `<div class="empty-state"><p>Please return to the home page and select a valid subject.</p></div>`;
        }
    </script>
</body>
</html>
